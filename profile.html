<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Lenovo LOQ 15</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .profile-main {
            padding-top: 120px;
            min-height: 100vh;
            background: #050505;
            display: flex;
            justify-content: center;
        }

        .profile-container {
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .profile-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(64, 134, 255, 0.1) 0%, transparent 70%);
            z-index: 0;
            top: -150px;
            left: -150px;
        }

        .profile-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #fff;
            border: 2px solid #4086ff;
        }

        .profile-info h1 {
            font-size: 2rem;
            color: #fff;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: #888;
            font-size: 1rem;
        }

        .profile-form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .profile-form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            color: #bbb;
        }

        .form-group input, .form-group select {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .form-group select option {
            background: #111;
            color: #fff;
        }

        .btn-save {
            padding: 15px 30px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            align-self: flex-start;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.2);
        }

        .status-message {
            margin-top: 10px;
            font-size: 0.95rem;
        }
        .success-text { color: #4CAF50; }
        .error-text { color: #F44336; }

        .logout-btn {
            color: #F44336;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .logout-btn:hover { text-decoration: underline; }

        .nav-profile-icon {
            color: white;
            text-decoration: none;
            font-size: 1.4rem;
            margin-right: 15px;
            display: flex;
            align-items: center;
        }
        
    </style>

<body class="page-profile">
    <nav class="navbar solid-nav" id="navbar">
        <div class="nav-content">
            <div class="nav-brand" style="display: flex; align-items: center;">
                <a href="profile.html" class="nav-profile-icon" title="My Profile">👤</a>
                <a href="index.html" style="color:white; text-decoration:none;">LOQ</a>
            </div>
            <div class="nav-links">
                <a href="performance.html">Performance</a>
                <a href="display.html">Display</a>
                <a href="cooling.html">Cooling</a>
                <a href="specs.html">Specs</a>
            </div>
            <a href="purchase.html" class="btn-primary">Experience Now</a>
        </div>
    </nav>

    <main class="profile-main">
        <div class="profile-container fade-in">
            <div class="profile-glow"></div>
            <div class="profile-content">
                
                <div class="profile-header">
                    <div class="profile-avatar">👤</div>
                    <div class="profile-info">
                        <h1 id="display-username">Loading...</h1>
                        <p id="display-email">Please wait</p>
                        <a class="logout-btn" onclick="logout()">Logout</a>
                    </div>
                </div>

                <form id="profile-form" onsubmit="saveProfile(event)">
                    <div class="profile-form-grid">
                        <div class="form-group">
                            <label for="region">Region / Country</label>
                            <select id="region">
                                <option value="">Select Country</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="+1 234 567 8900">
                        </div>
                        <div class="form-group">
                            <label for="dob">Date of Birth</label>
                            <input type="date" id="dob">
                        </div>
                        <div class="form-group">
                            <label for="gender">Gender</label>
                            <select id="gender">
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="non-binary">Non-Binary</option>
                                <option value="prefer-not-to-say">Prefer not to say</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-save">Save Profile</button>
                    <div id="status-message" class="status-message"></div>
                </form>

            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from(".fade-in", { opacity: 0, y: 30, duration: 1, ease: "power3.out" });

        const currentUser = localStorage.getItem('user');

        if (!currentUser) {
            window.location.href = 'login.html'; // Redirect to login if not authenticated
        }

        // Fetch user data
        async function fetchProfile() {
            try {
                const res = await fetch(`http://localhost:3000/api/user/${currentUser}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('display-username').innerText = data.username;
                    document.getElementById('display-email').innerText = data.email;
                    
                    // Populate form
                    // Populate form
                    if (data.region) {
                        document.getElementById('region').value = data.region;
                    }
                    if (data.phone) document.getElementById('phone').value = data.phone;
                    if (data.dob) document.getElementById('dob').value = data.dob;
                    if (data.gender) document.getElementById('gender').value = data.gender;
                } else {
                    document.getElementById('display-username').innerText = "User not found";
                }
            } catch (err) {
                console.error("Failed to load profile", err);
            }
        }

        // Save profile data
        async function saveProfile(e) {
            e.preventDefault();
            const statusEl = document.getElementById('status-message');
            const btn = document.querySelector('.btn-save');
            btn.innerText = "Saving...";
            
            const payload = {
                region: document.getElementById('region').value,
                phone: document.getElementById('phone').value,
                dob: document.getElementById('dob').value,
                gender: document.getElementById('gender').value
            };

            try {
                const res = await fetch(`http://localhost:3000/api/user/${currentUser}/profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    statusEl.innerText = "Profile updated successfully!";
                    statusEl.className = "status-message success-text";
                } else {
                    statusEl.innerText = data.error || "Update failed.";
                    statusEl.className = "status-message error-text";
                }
            } catch (err) {
                statusEl.innerText = "Server error. Please try again.";
                statusEl.className = "status-message error-text";
            } finally {
                btn.innerText = "Save Profile";
                setTimeout(() => statusEl.innerText = "", 3000);
            }
        }

            localStorage.removeItem('user');
            window.location.href = 'index.html';

        const regionSelect = document.getElementById('region');
        countries.forEach(country => {
            const option = document.createElement('option');
            option.value = country.name;
            option.text = country.name;
            option.dataset.code = country.code;
            regionSelect.appendChild(option);
        });

        // Automatically set phone prefix
        regionSelect.addEventListener('change', (e) => {
            const selectedOption = e.target.options[e.target.selectedIndex];
            const code = selectedOption.dataset.code;
            const phoneInput = document.getElementById('phone');
            
            if (code) {
                // If the user already has a number, keep it but change the prefix. 
                // Alternatively, just set it if it's empty. Let's just prefix it cleanly.
                let currentVal = phoneInput.value.trim();
                // Strip existing standard country codes to replace them
                if (currentVal.startsWith('+')) {
                    currentVal = currentVal.replace(/^\+\d+\s*/, '');
                }
                phoneInput.value = `${code} ${currentVal}`;
            }
